<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magnet AR Hybrid</title>

<style>
body{margin:0;overflow:hidden;background:black;font-family:Arial}
video,canvas{position:fixed;width:100vw;height:100vh;object-fit:cover}
canvas{z-index:1}
#ui{
position:fixed;top:10px;left:10px;z-index:2;
background:rgba(0,0,0,.45);color:white;
padding:10px;border-radius:12px;
}
.blue{color:#00eaff}
.red{color:#ff4040}
</style>
</head>

<body>

<video id="cam" autoplay playsinline></video>
<canvas id="c"></canvas>

<div id="ui">
<div class="blue">Champ magnétique : <span id="mag">0</span></div>
<div class="red">Métal détecté : <span id="metal">NON</span></div>
<div>Direction Terre : <span id="dir">0°</span></div>
<button onclick="startSensors()">Activer capteurs</button>
</div>

<script>
// CAMERA
navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}})
.then(stream=>cam.srcObject=stream);

// CANVAS
const canvas=c;
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

// AUDIO BIP
const audioCtx=new (window.AudioContext||window.webkitAudioContext)();
function beep(freq){
const osc=audioCtx.createOscillator();
osc.frequency.value=freq;
osc.connect(audioCtx.destination);
osc.start();
setTimeout(()=>osc.stop(),80);
}

// VARIABLES
let earthDir=0;
let baseline=0;
let metal=false;
let magneticPower=0;

// PERMISSIONS IOS
async function startSensors(){
if(typeof DeviceMotionEvent.requestPermission==="function"){
await DeviceMotionEvent.requestPermission();
await DeviceOrientationEvent.requestPermission();
}
initSensors();
}

function initSensors(){

// BOUSSOLE → direction champ terrestre 🌍
window.addEventListener("deviceorientationabsolute",e=>{
earthDir=e.alpha||0;
dir.innerText=Math.round(earthDir)+"°";
});

// ACCELEROMETRE → détecteur métal 🧲
window.addEventListener("devicemotion",e=>{
let a=e.accelerationIncludingGravity;
let total=Math.sqrt(a.x*a.x+a.y*a.y+a.z*a.z);

if(!baseline) baseline=total;

magneticPower=Math.abs(total-baseline)*50;
mag.innerText=magneticPower.toFixed(1);

if(magneticPower>15){
if(!metal) beep(800);
metal=true;
metalTxt.innerText="OUI";
}else{
metal=false;
metalTxt.innerText="NON";
}
});
}

const metalTxt=document.getElementById("metal");

// PARTICULES
let parts=[];
for(let i=0;i<250;i++){
parts.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height});
}

// DRAW LOOP
function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

// 🌍 DIRECTION CHAMP TERRESTRE (fond bleu)
let ang=(earthDir-90)*Math.PI/180;
ctx.strokeStyle="rgba(0,200,255,0.6)";
ctx.lineWidth=4;
ctx.beginPath();
ctx.moveTo(canvas.width/2,canvas.height/2);
ctx.lineTo(
canvas.width/2+Math.cos(ang)*500,
canvas.height/2+Math.sin(ang)*500
);
ctx.stroke();

// 🔵 PARTICULES CHAMP MAGNETIQUE
parts.forEach(p=>{
p.x+=Math.cos(ang)*(magneticPower*0.05);
p.y+=Math.sin(ang)*(magneticPower*0.05);

ctx.fillStyle="rgba(0,255,255,.8)";
ctx.beginPath();
ctx.arc(p.x,p.y,2,0,Math.PI*2);
ctx.fill();
});

// 🔴 ALERTE METAL
if(metal){
ctx.fillStyle="rgba(255,0,0,.25)";
ctx.beginPath();
ctx.arc(canvas.width/2,canvas.height/2,250,0,Math.PI*2);
ctx.fill();
}

requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
