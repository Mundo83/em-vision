<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magnet AR</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
  font-family:Arial,Helvetica,sans-serif;
}

video{
  position:fixed;
  width:100vw;
  height:100vh;
  object-fit:cover;
  z-index:0;
}

canvas{
  position:fixed;
  width:100vw;
  height:100vh;
  z-index:1;
}

#ui{
  position:fixed;
  top:10px;
  left:10px;
  color:#00ffea;
  z-index:2;
  background:rgba(0,0,0,.45);
  padding:10px;
  border-radius:10px;
  backdrop-filter: blur(6px);
}

.big{
  font-size:22px;
  font-weight:bold;
}

.small{
  font-size:12px;
  opacity:.8;
}
</style>
</head>

<body>

<video id="cam" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<div id="ui">
  <div class="big">Champ magnétique : <span id="power">0</span> µT</div>
  <div>X : <span id="x">0</span></div>
  <div>Y : <span id="y">0</span></div>
  <div>Z : <span id="z">0</span></div>
  <div class="small">
  Z = derrière / écran<br>
  X = gauche / droite<br>
  Y = haut / bas
  </div>
</div>

<script>
// CAMERA
navigator.mediaDevices.getUserMedia({
  video:{ facingMode:"environment" }
}).then(stream=>{
  document.getElementById("cam").srcObject=stream;
});

// CANVAS
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

let particles=[];
for(let i=0;i<200;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    vx:0,
    vy:0
  });
}

let mag={x:0,y:0,z:0,strength:0};

// MAGNETOMETER
if("Magnetometer" in window){
  const sensor=new Magnetometer({frequency:30});
  sensor.addEventListener("reading", ()=>{
    mag.x=sensor.x;
    mag.y=sensor.y;
    mag.z=sensor.z;
    mag.strength=Math.sqrt(mag.x**2+mag.y**2+mag.z**2);
    updateUI();
  });
  sensor.start();
}else{
  alert("Magnétomètre non supporté 😢 (Android Chrome conseillé)");
}

function updateUI(){
  power.innerText=mag.strength.toFixed(1);
  x.innerText=mag.x.toFixed(1);
  y.innerText=mag.y.toFixed(1);
  z.innerText=mag.z.toFixed(1);
}

// DRAW RADAR
function drawRadar(){
  const cx=canvas.width/2;
  const cy=canvas.height/2;

  ctx.strokeStyle="rgba(0,255,200,.3)";
  ctx.lineWidth=2;

  for(let r=100;r<500;r+=100){
    ctx.beginPath();
    ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.stroke();
  }

  // direction aimant (projection X/Y)
  const angle=Math.atan2(mag.y,mag.x);
  ctx.strokeStyle="rgba(0,255,255,.8)";
  ctx.beginPath();
  ctx.moveTo(cx,cy);
  ctx.lineTo(cx+Math.cos(angle)*400, cy+Math.sin(angle)*400);
  ctx.stroke();
}

// PARTICLES
function updateParticles(){
  const force = Math.min(mag.strength/80, 5);

  particles.forEach(p=>{
    const angle=Math.atan2(mag.y,mag.x);

    p.vx += Math.cos(angle)*force*0.2;
    p.vy += Math.sin(angle)*force*0.2;

    p.vx*=0.95;
    p.vy*=0.95;

    p.x+=p.vx;
    p.y+=p.vy;

    if(p.x<0||p.x>canvas.width) p.vx*=-1;
    if(p.y<0||p.y>canvas.height) p.vy*=-1;

    const glow=Math.min(mag.strength*3,255);
    ctx.fillStyle=`rgba(0,255,${glow},0.9)`;
    ctx.beginPath();
    ctx.arc(p.x,p.y,2,0,Math.PI*2);
    ctx.fill();
  });
}

// LOOP
function loop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawRadar();
  updateParticles();
  requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
