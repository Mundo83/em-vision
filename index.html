<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magnetic Vision</title>
</head>

<body style="margin:0; overflow:hidden; background:black;">

<video id="video" autoplay playsinline muted style="
position:absolute;
width:100%;
height:100%;
object-fit:cover;
z-index:0;
"></video>

<canvas id="canvas" style="
position:absolute;
top:0;
left:0;
z-index:1;
"></canvas>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// resize
function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

// 🎥 CAMERA FIX
async function startCamera(){
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment" },
      audio: false
    });

    video.srcObject = stream;

    // 🔥 IMPORTANT (corrige ton bug)
    await video.play();

  } catch(err){
    console.error(err);
    alert("Erreur caméra : HTTPS obligatoire ou permission refusée");
  }
}

// 📱 CAPTEUR MAGNÉTIQUE (si dispo)
let field = {x:0,y:0,z:0};

function startMagnetometer(){

  if ("Magnetometer" in window) {
    try {
      const sensor = new Magnetometer({frequency: 30});

      sensor.addEventListener("reading", () => {
        field.x = sensor.x;
        field.y = sensor.y;
        field.z = sensor.z;
      });

      sensor.start();
      console.log("Magnetometer actif");

    } catch(err){
      console.log("Capteur bloqué:", err);
      startFakeField();
    }

  } else {
    console.log("Pas de capteur → simulation");
    startFakeField();
  }
}

// 🧲 fallback simulation
function startFakeField(){
  setInterval(()=>{
    let t = Date.now()*0.001;
    field.x = Math.sin(t);
    field.y = Math.cos(t);
    field.z = Math.sin(t*0.5);
  },50);
}

// 🎧 AUDIO
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const osc = audioCtx.createOscillator();
const gain = audioCtx.createGain();

osc.connect(gain);
gain.connect(audioCtx.destination);
osc.start();

document.body.addEventListener("click", async ()=>{
  await audioCtx.resume();
  startCamera();
  startMagnetometer();
});

// ✨ particules
let particles = [];

for(let i=0;i<1000;i++){
  particles.push({
    x: Math.random()*window.innerWidth,
    y: Math.random()*window.innerHeight,
    vx:0,
    vy:0
  });
}

// 🎨 rendu
function draw(){

  ctx.fillStyle = "rgba(0,0,0,0.1)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  let strength = Math.sqrt(field.x**2 + field.y**2 + field.z**2);
  let angle = Math.atan2(field.y, field.x);

  gain.gain.value = Math.min(0.3, strength/50);
  osc.frequency.value = 100 + strength*10;

  particles.forEach(p=>{

    let dx = p.x - canvas.width/2;
    let dy = p.y - canvas.height/2;
    let dist = Math.sqrt(dx*dx+dy*dy)+1;

    let force = 100 / dist;

    p.vx += Math.cos(angle) * force * 0.01;
    p.vy += Math.sin(angle) * force * 0.01;

    p.x += p.vx;
    p.y += p.vy;

    p.vx *= 0.95;
    p.vy *= 0.95;

    if(p.x<0||p.x>canvas.width||p.y<0||p.y>canvas.height){
      p.x = Math.random()*canvas.width;
      p.y = Math.random()*canvas.height;
      p.vx=0; p.vy=0;
    }

    let color = Math.min(255, strength*5);

    ctx.fillStyle = `rgba(${color},255,200,0.7)`;
    ctx.fillRect(p.x,p.y,2,2);
  });

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
