<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EM Vision PRO</title>
</head>

<body style="margin:0; overflow:hidden; background:black; font-family:Arial">

<video id="video"></video>
<canvas id="canvas"></canvas>

<button id="startBtn">DÉMARRER SCAN</button>

<div id="legend">
🔵 Aimant détecté<br>
🟢 Métal détecté<br>
⚪ Champ normal
</div>

<style>
#video{
position:absolute;width:100%;height:100%;object-fit:cover;z-index:0;
}
#canvas{
position:absolute;top:0;left:0;z-index:1;
}
#startBtn{
position:absolute;z-index:2;top:50%;left:50%;
transform:translate(-50%,-50%);
padding:20px 40px;font-size:20px;
background:black;color:white;border:2px solid white;border-radius:10px;
}
#legend{
position:absolute;bottom:20px;left:20px;z-index:2;
background:rgba(0,0,0,0.5);color:white;padding:15px;border-radius:10px;
}
</style>

<script>
const video=document.getElementById("video");
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
const btn=document.getElementById("startBtn");

canvas.width=innerWidth;
canvas.height=innerHeight;

let field={x:0,y:0,z:0};
let baseline=0;
let calibrated=false;
let delta=0;

// 📷 CAMERA FIX SAMSUNG
async function startCamera(){
try{
video.setAttribute("autoplay",true);
video.setAttribute("muted",true);
video.setAttribute("playsinline",true);

const stream=await navigator.mediaDevices.getUserMedia({
video:{
facingMode:{exact:"environment"}
},
audio:false
});

video.srcObject=stream;
await video.play();
}catch(e){
alert("Erreur caméra : "+e);
}
}

// 🧭 CAPTEUR MAGNETIQUE REEL
async function startSensors(){

if(typeof DeviceOrientationEvent.requestPermission==="function"){
await DeviceOrientationEvent.requestPermission();
}

window.addEventListener("deviceorientationabsolute",e=>{
field.x=e.alpha||0;
field.y=e.beta||0;
field.z=e.gamma||0;
});

}

// 🔊 AUDIO
const audioCtx=new(window.AudioContext||window.webkitAudioContext)();
const osc=audioCtx.createOscillator();
const gain=audioCtx.createGain();
osc.connect(gain);gain.connect(audioCtx.destination);
osc.start();gain.gain.value=0;

// ✨ PARTICULES
let particles=[];
for(let i=0;i<900;i++){
particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:0,vy:0});
}

// 🎨 DETECTION AIMANT / METAL
function detectField(){
let strength=Math.sqrt(field.x**2+field.y**2+field.z**2);

if(!calibrated){
baseline=baseline*0.98+strength*0.02;
if(Date.now()>startTime+3000) calibrated=true;
}

delta=Math.abs(strength-baseline);

// classification
if(delta>25) return "magnet";
if(delta>8) return "metal";
return "none";
}

function getColor(type){
if(type==="magnet") return "rgba(0,150,255,0.9)";
if(type==="metal") return "rgba(0,255,120,0.9)";
return "rgba(255,255,255,0.4)";
}

// 🎨 RENDER
let startTime=Date.now();
function draw(){
ctx.fillStyle="rgba(0,0,0,0.15)";
ctx.fillRect(0,0,canvas.width,canvas.height);

let type=detectField();
let color=getColor(type);

// son
gain.gain.value=Math.min(0.5,delta/40);
osc.frequency.value=150+delta*20;

particles.forEach(p=>{
let force=0.2+delta*0.05;
p.vx+=(Math.random()-0.5)*force;
p.vy+=(Math.random()-0.5)*force;
p.x+=p.vx;p.y+=p.vy;
p.vx*=0.95;p.vy*=0.95;

if(p.x<0||p.x>canvas.width||p.y<0||p.y>canvas.height){
p.x=Math.random()*canvas.width;
p.y=Math.random()*canvas.height;
}

ctx.fillStyle=color;
ctx.beginPath();
ctx.arc(p.x,p.y,1.5,0,Math.PI*2);
ctx.fill();
});

requestAnimationFrame(draw);
}
draw();

// 🚀 START GLOBAL
btn.onclick=async()=>{
btn.style.display="none";
await startSensors();
await audioCtx.resume();
await startCamera();
};
</script>
</body>
</html>
