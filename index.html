<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EM Vision REAL</title>
</head>

<body style="margin:0; overflow:hidden; background:black;">

<video id="video" autoplay playsinline muted style="
position:absolute;width:100%;height:100%;object-fit:cover;z-index:0;"></video>

<canvas id="canvas" style="position:absolute;top:0;left:0;z-index:1;"></canvas>

<button id="startBtn" style="
position:absolute;z-index:2;top:50%;left:50%;
transform:translate(-50%,-50%);
padding:20px 40px;font-size:20px;
background:black;color:white;border:2px solid white;border-radius:10px;">
DÉMARRER
</button>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const btn = document.getElementById("startBtn");

canvas.width = innerWidth;
canvas.height = innerHeight;

// 🧲 CHAMP RÉEL via BOUSSOLE
let field = {x:0,y:0,z:0};
let strength = 0;

async function requestOrientation(){
  if(typeof DeviceOrientationEvent.requestPermission === "function"){
    await DeviceOrientationEvent.requestPermission();
  }

  window.addEventListener("deviceorientationabsolute", e=>{
    field.x = e.alpha || 0;
    field.y = e.beta || 0;
    field.z = e.gamma || 0;
  });

  window.addEventListener("deviceorientation", e=>{
    field.x = e.alpha || 0;
    field.y = e.beta || 0;
    field.z = e.gamma || 0;
  });
}

// 📷 CAMERA (méthode brute fiable)
async function startCamera(){
  const stream = await navigator.mediaDevices.getUserMedia({
    video:{
      facingMode:"environment"
    },
    audio:false
  });

  video.srcObject = stream;
  video.play();
}

// 🎧 AUDIO
const audioCtx = new (window.AudioContext||window.webkitAudioContext)();
const osc = audioCtx.createOscillator();
const gain = audioCtx.createGain();
osc.connect(gain);
gain.connect(audioCtx.destination);
osc.start();
gain.gain.value = 0;

// ✨ PARTICULES
let particles=[];
for(let i=0;i<1200;i++){
 particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:0,vy:0});
}

// 🎨 COULEUR MÉTAL / AIMANT
function getColor(strength){
  if(strength>40) return "rgba(255,50,50,0.9)"; // aimant/métal proche
  if(strength>20) return "rgba(50,255,100,0.8)";
  return "rgba(50,150,255,0.6)";
}

// 🎨 RENDER
function draw(){
 ctx.fillStyle="rgba(0,0,0,0.1)";
 ctx.fillRect(0,0,canvas.width,canvas.height);

 strength = Math.sqrt(field.x*field.x + field.y*field.y + field.z*field.z);
 let angle = field.x * 0.05;

 gain.gain.value = Math.min(0.5,strength/50);
 osc.frequency.value = 150 + strength*5;

 particles.forEach(p=>{
   let force = 0.3 + strength*0.02;
   p.vx += Math.cos(angle)*force;
   p.vy += Math.sin(angle)*force;
   p.x += p.vx; p.y += p.vy;
   p.vx*=0.95; p.vy*=0.95;

   if(p.x<0||p.x>canvas.width||p.y<0||p.y>canvas.height){
     p.x=Math.random()*canvas.width;
     p.y=Math.random()*canvas.height;
   }

   ctx.fillStyle=getColor(strength);
   ctx.beginPath();
   ctx.arc(p.x,p.y,1.5,0,Math.PI*2);
   ctx.fill();
 });

 requestAnimationFrame(draw);
}
draw();

// 🚀 START ordre critique mobile
btn.onclick = async ()=>{
  btn.style.display="none";

  await requestOrientation(); // 🧲 permission capteurs
  await audioCtx.resume();    // 🔊 permission audio
  await startCamera();        // 📷 caméra

};
</script>
</body>
</html>
