<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magnetic Vision</title>
</head>

<body style="margin:0; overflow:hidden; background:black;">

<!-- 🎥 CAMERA -->
<video id="video" autoplay playsinline muted style="
position:absolute;
width:100%;
height:100%;
object-fit:cover;
z-index:0;
"></video>

<!-- 🎨 CANVAS -->
<canvas id="canvas" style="
position:absolute;
top:0;
left:0;
z-index:1;
"></canvas>

<!-- 🔥 BOUTON -->
<button id="startBtn" style="
position:absolute;
z-index:2;
top:50%;
left:50%;
transform:translate(-50%,-50%);
padding:20px 40px;
font-size:20px;
background:black;
color:white;
border:2px solid white;
border-radius:10px;
">
DÉMARRER
</button>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const btn = document.getElementById("startBtn");

// resize
function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

// champ
let field = {x:0,y:0,z:0};

// caméra
async function startCamera(){
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment" }
    });
    video.srcObject = stream;
    await video.play();
  } catch(e){
    alert("Caméra bloquée !");
    console.log(e);
  }
}

// capteur OU simulation
function startField(){
  if ("Magnetometer" in window){
    try{
      const sensor = new Magnetometer({frequency:30});
      sensor.addEventListener("reading", ()=>{
        field.x = sensor.x;
        field.y = sensor.y;
        field.z = sensor.z;
      });
      sensor.start();
    }catch{
      fake();
    }
  } else {
    fake();
  }
}

function fake(){
  setInterval(()=>{
    let t = Date.now()*0.001;
    field.x = Math.sin(t);
    field.y = Math.cos(t);
    field.z = Math.sin(t*0.5);
  },50);
}

// AUDIO
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const osc = audioCtx.createOscillator();
const gain = audioCtx.createGain();

osc.connect(gain);
gain.connect(audioCtx.destination);
osc.start();
gain.gain.value = 0;

// particules
let particles = [];
for(let i=0;i<800;i++){
  particles.push({
    x: Math.random()*window.innerWidth,
    y: Math.random()*window.innerHeight,
    vx:0, vy:0
  });
}

// rendu
function draw(){

  ctx.fillStyle = "rgba(0,0,0,0.1)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  let strength = Math.sqrt(field.x**2 + field.y**2 + field.z**2);
  let angle = Math.atan2(field.y, field.x);

  gain.gain.value = Math.min(0.3, strength/50);
  osc.frequency.value = 100 + strength*10;

  particles.forEach(p=>{
    let dx = p.x - canvas.width/2;
    let dy = p.y - canvas.height/2;
    let dist = Math.sqrt(dx*dx+dy*dy)+1;

    let force = 80/dist;

    p.vx += Math.cos(angle)*force*0.02;
    p.vy += Math.sin(angle)*force*0.02;

    p.x += p.vx;
    p.y += p.vy;

    p.vx *= 0.95;
    p.vy *= 0.95;

    if(p.x<0||p.x>canvas.width||p.y<0||p.y>canvas.height){
      p.x = Math.random()*canvas.width;
      p.y = Math.random()*canvas.height;
      p.vx=0; p.vy=0;
    }

    ctx.fillStyle = "rgba(0,255,200,0.7)";
    ctx.fillRect(p.x,p.y,2,2);
  });

  requestAnimationFrame(draw);
}
draw();

// bouton = clé magique
btn.addEventListener("click", async ()=>{
  btn.style.display = "none";
  await audioCtx.resume();
  await startCamera();
  startField();
});
</script>

</body>
</html>
