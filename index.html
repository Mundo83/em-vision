<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EM Vision PRO</title>
<style>
body{margin:0;overflow:hidden;background:black;font-family:Arial;color:white}
#video{position:absolute;width:100%;height:100%;object-fit:cover;z-index:0}
#canvas{position:absolute;top:0;left:0;z-index:1}
#ui{
position:absolute;bottom:20px;left:50%;
transform:translateX(-50%);
z-index:2;text-align:center;
}
#radar{
width:150px;height:150px;border:2px solid white;
border-radius:50%;margin:auto;position:relative;
}
#needle{
width:2px;height:70px;background:white;
position:absolute;left:50%;bottom:50%;
transform-origin:bottom center;
}
#status{margin-top:10px;font-size:18px}
#startBtn{
position:absolute;z-index:3;top:50%;left:50%;
transform:translate(-50%,-50%);
padding:20px 40px;font-size:20px;
background:black;color:white;border:2px solid white;border-radius:10px;
}
</style>
</head>
<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<button id="startBtn">DÉMARRER SCAN</button>

<div id="ui">
<div id="radar"><div id="needle"></div></div>
<div id="status">Calibration...</div>
</div>

<script>
const video=document.getElementById("video");
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
const btn=document.getElementById("startBtn");
const needle=document.getElementById("needle");
const statusText=document.getElementById("status");

canvas.width=innerWidth;
canvas.height=innerHeight;

let mag={x:0,y:0,z:0};
let baseline=0;
let calibrated=false;
let lastStrength=0;
let variation=0;

// CAMERA FIX SAMSUNG
async function startCamera(){
try{
const stream=await navigator.mediaDevices.getUserMedia({
video:{facingMode:{ideal:"environment"}},
audio:false
});
video.srcObject=stream;
await video.play();
}catch(e){
statusText.innerText="Caméra non disponible";
}
}

// MAGNETIC SENSOR
async function startSensor(){
if(typeof DeviceOrientationEvent.requestPermission==="function"){
await DeviceOrientationEvent.requestPermission();
}
window.addEventListener("deviceorientationabsolute",e=>{
mag.x=e.alpha||0;
mag.y=e.beta||0;
mag.z=e.gamma||0;
});
}

// AUDIO DOUX
const audioCtx=new(window.AudioContext||window.webkitAudioContext)();
const osc=audioCtx.createOscillator();
const gain=audioCtx.createGain();
const filter=audioCtx.createBiquadFilter();

osc.type="sine";
filter.type="lowpass";
filter.frequency.value=500;

osc.connect(filter);
filter.connect(gain);
gain.connect(audioCtx.destination);
osc.start();
gain.gain.value=0;

// PARTICULES
let particles=[];
for(let i=0;i<600;i++){
particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height});
}

function draw(){
ctx.fillStyle="rgba(0,0,0,0.2)";
ctx.fillRect(0,0,canvas.width,canvas.height);

let strength=Math.sqrt(mag.x**2+mag.y**2+mag.z**2);

if(!calibrated){
baseline=baseline*0.98+strength*0.02;
if(Date.now()>startTime+3000){
calibrated=true;
statusText.innerText="Scan actif";
}
}

variation=Math.abs(strength-lastStrength);
lastStrength=strength;

// détection réelle
let detected=false;
if(variation>15){detected=true;}

let angle=Math.atan2(mag.y,mag.x);
needle.style.transform="rotate("+angle+"rad)";

// son doux progressif
gain.gain.value=Math.min(0.3,variation/50);
osc.frequency.value=120+variation*5;

// particules directionnelles
particles.forEach(p=>{
p.x+=Math.cos(angle)*(detected?3:0.5);
p.y+=Math.sin(angle)*(detected?3:0.5);

if(p.x<0||p.x>canvas.width||p.y<0||p.y>canvas.height){
p.x=Math.random()*canvas.width;
p.y=Math.random()*canvas.height;
}

ctx.fillStyle=detected?"rgba(0,150,255,0.9)":"rgba(255,255,255,0.3)";
ctx.beginPath();
ctx.arc(p.x,p.y,1.5,0,Math.PI*2);
ctx.fill();
});

requestAnimationFrame(draw);
}
let startTime=Date.now();
draw();

btn.onclick=async()=>{
btn.style.display="none";
await startSensor();
await audioCtx.resume();
await startCamera();
};
</script>
</body>
</html>
