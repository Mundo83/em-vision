<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EM Vision PRO</title>
</head>

<body style="margin:0;overflow:hidden;background:black;font-family:Arial">

<video id="video"></video>
<canvas id="canvas"></canvas>
<button id="startBtn">DÉMARRER SCAN</button>

<style>
#video{position:absolute;width:100%;height:100%;object-fit:cover;z-index:0}
#canvas{position:absolute;top:0;left:0;z-index:1}
#startBtn{
position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
padding:20px 40px;font-size:20px;background:black;color:white;
border:2px solid white;border-radius:10px;z-index:2}
</style>

<script>
const video=document.getElementById("video");
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
const btn=document.getElementById("startBtn");
canvas.width=innerWidth; canvas.height=innerHeight;

//================ CAMERA SAMSUNG FIX ULTIME ================
async function startCamera(){
 try{
   // 1️⃣ ouvrir n'importe quelle caméra
   let temp=await navigator.mediaDevices.getUserMedia({video:true});
   temp.getTracks().forEach(t=>t.stop());

   // 2️⃣ récupérer la liste
   let devices=await navigator.mediaDevices.enumerateDevices();
   let back=devices.find(d=>d.kind==="videoinput" && d.label.toLowerCase().includes("back"));

   // 3️⃣ ouvrir caméra arrière réelle
   const stream=await navigator.mediaDevices.getUserMedia({
     video: back ? {deviceId:{exact:back.deviceId}} : {facingMode:"environment"}
   });

   video.srcObject=stream;
   video.setAttribute("playsinline",true);
   video.muted=true;
   await video.play();
 }catch(e){alert("Erreur caméra : "+e)}
}

//================ CAPTEUR MAGNETIQUE FILTRÉ ================
let raw=0, filtered=0, delta=0, direction=0;
let history=[];

window.addEventListener("deviceorientationabsolute",e=>{
  let strength=Math.sqrt(e.alpha**2+e.beta**2+e.gamma**2);
  raw=strength;

  // filtre anti rotation terrestre (low pass)
  filtered = filtered*0.97 + raw*0.03;
  delta = Math.abs(raw - filtered);

  direction = e.alpha * Math.PI/180;
});

//================ AUDIO DOUX (SONAR) ================
const audioCtx=new (window.AudioContext||window.webkitAudioContext)();
const osc=audioCtx.createOscillator();
const gain=audioCtx.createGain();
osc.type="sine";
osc.connect(gain);gain.connect(audioCtx.destination);
osc.start();gain.gain.value=0;

//================ PARTICULES DIRECTIONNELLES ================
let particles=[];
for(let i=0;i<700;i++){
 particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height});
}

function drawRadar(){
 let cx=canvas.width/2, cy=canvas.height/2;
 ctx.strokeStyle="rgba(0,255,0,0.3)";
 ctx.beginPath(); ctx.arc(cx,cy,120,0,Math.PI*2); ctx.stroke();
 ctx.beginPath(); ctx.arc(cx,cy,200,0,Math.PI*2); ctx.stroke();

 // aiguille direction champ
 ctx.strokeStyle="lime";
 ctx.lineWidth=3;
 ctx.beginPath();
 ctx.moveTo(cx,cy);
 ctx.lineTo(cx+Math.cos(direction)*200, cy+Math.sin(direction)*200);
 ctx.stroke();
}

function detectType(){
 if(delta>18) return "magnet";
 if(delta>6) return "metal";
 return "none";
}

function getColor(type){
 if(type==="magnet") return "#00aaff";
 if(type==="metal") return "#00ff88";
 return "#ffffff22";
}

//================ RENDER ================
function draw(){
 ctx.fillStyle="rgba(0,0,0,0.2)";
 ctx.fillRect(0,0,canvas.width,canvas.height);

 let type=detectType();
 let color=getColor(type);

 // son radar doux
 gain.gain.value = Math.min(0.3, delta/40);
 osc.frequency.value = 200 + delta*8;

 // particules suivent direction champ
 particles.forEach(p=>{
   p.x += Math.cos(direction)*delta*0.3 + (Math.random()-0.5)*1;
   p.y += Math.sin(direction)*delta*0.3 + (Math.random()-0.5)*1;

   if(p.x<0||p.x>canvas.width||p.y<0||p.y>canvas.height){
     p.x=Math.random()*canvas.width;
     p.y=Math.random()*canvas.height;
   }

   ctx.fillStyle=color;
   ctx.fillRect(p.x,p.y,2,2);
 });

 drawRadar();
 requestAnimationFrame(draw);
}
draw();

//================ START GLOBAL ================
btn.onclick=async()=>{
 btn.style.display="none";
 await audioCtx.resume();
 await startCamera();
};
</script>
</body>
</html>
