<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EM Vision PRO</title>
</head>

<body style="margin:0; overflow:hidden; background:black;">

<video id="video" autoplay playsinline muted style="
position:absolute;
width:100%;
height:100%;
object-fit:cover;
z-index:0;"></video>

<canvas id="canvas" style="
position:absolute;
top:0;
left:0;
z-index:1;"></canvas>

<button id="startBtn" style="
position:absolute;
z-index:2;
top:50%;
left:50%;
transform:translate(-50%,-50%);
padding:20px 40px;
font-size:20px;
background:black;
color:white;
border:2px solid white;
border-radius:10px;">
DÉMARRER
</button>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const btn = document.getElementById("startBtn");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

// 🧲 FIELD
let field = {x:0,y:0,z:0};
let strength = 0;

// 🎥 CAMERA ARRIÈRE (FIX MOBILE)
async function startCamera(){
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{
        facingMode:{ ideal:"environment" },
        width:{ ideal:1920 },
        height:{ ideal:1080 }
      },
      audio:false
    });

    video.srcObject = stream;
    await video.play();

  } catch(err){
    alert("Autorise la caméra puis recharge la page !");
    console.error(err);
  }
}

// 🧲 MAGNETOMÈTRE
function startMagnet(){
  if ("Magnetometer" in window){
    try{
      const sensor = new Magnetometer({frequency:30});
      sensor.addEventListener("reading", ()=>{
        field.x = sensor.x;
        field.y = sensor.y;
        field.z = sensor.z;
      });
      sensor.start();
    }catch{
      fakeField();
    }
  } else {
    fakeField();
  }
}

// fallback si capteur indisponible
function fakeField(){
  setInterval(()=>{
    let t = Date.now()*0.001;
    field.x = Math.sin(t);
    field.y = Math.cos(t);
    field.z = Math.sin(t*0.5);
  },50);
}

// 🎧 AUDIO
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const osc = audioCtx.createOscillator();
const gain = audioCtx.createGain();
const filter = audioCtx.createBiquadFilter();

osc.connect(filter);
filter.connect(gain);
gain.connect(audioCtx.destination);

osc.start();
gain.gain.value = 0;

// ✨ PARTICULES
let particles = [];
for(let i=0;i<1200;i++){
  particles.push({
    x: Math.random()*window.innerWidth,
    y: Math.random()*window.innerHeight,
    vx:0, vy:0
  });
}

// 🎨 COULEURS CHAMP
function getColor(strength){
  if(strength > 80) return "rgba(255,50,50,0.9)";
  if(strength > 40) return "rgba(50,255,100,0.8)";
  return "rgba(50,150,255,0.6)";
}

// 📡 SIMULATION FRÉQUENCES (wifi/bluetooth/radio)
function freqEffect(t){
  return Math.sin(t*10)*0.5 + Math.sin(t*25)*0.3;
}

// 🎨 RENDER
function draw(){

  ctx.fillStyle = "rgba(0,0,0,0.08)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  strength = Math.sqrt(field.x**2 + field.y**2 + field.z**2);
  let angle = Math.atan2(field.y, field.x);
  let t = Date.now()*0.001;
  let freq = freqEffect(t);

  // 🎧 son
  gain.gain.value = Math.min(0.4, strength/100);
  osc.frequency.value = 100 + strength*5 + freq*200;
  filter.frequency.value = 300 + strength*20;

  particles.forEach(p=>{

    let dx = p.x - canvas.width/2;
    let dy = p.y - canvas.height/2;
    let dist = Math.sqrt(dx*dx+dy*dy)+1;
    let force = (100/dist) + freq*2;

    p.vx += Math.cos(angle + freq)*force*0.02;
    p.vy += Math.sin(angle + freq)*force*0.02;

    p.x += p.vx;
    p.y += p.vy;

    p.vx *= 0.95;
    p.vy *= 0.95;

    if(p.x<0||p.x>canvas.width||p.y<0||p.y>canvas.height){
      p.x = Math.random()*canvas.width;
      p.y = Math.random()*canvas.height;
      p.vx=0; p.vy=0;
    }

    ctx.fillStyle = getColor(strength);
    ctx.beginPath();
    ctx.arc(p.x, p.y, 1.5, 0, Math.PI*2);
    ctx.fill();
  });

  requestAnimationFrame(draw);
}
draw();

// 🚀 START
btn.addEventListener("click", async ()=>{
  btn.style.display="none";
  await audioCtx.resume();
  await startCamera();
  startMagnet();
});
</script>

</body>
</html>
