<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EM Vision PRO MAX</title>

<style>
body{margin:0;background:black;font-family:Arial;color:white;overflow:hidden}
video{position:absolute;width:100%;height:100%;object-fit:cover}
canvas{position:absolute;top:0;left:0}
#hud{position:absolute;bottom:20px;width:100%;text-align:center}
#gauge{width:220px;height:220px;border:3px solid white;border-radius:50%;margin:auto;position:relative}
#needle{width:4px;height:100px;background:white;position:absolute;left:50%;bottom:50%;transform-origin:bottom}
#status{margin-top:10px;font-size:20px}
button{
position:absolute;top:50%;left:50%;
transform:translate(-50%,-50%);
padding:20px 40px;font-size:22px;
background:black;color:white;border:2px solid white;border-radius:10px;
}
</style>
</head>

<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<button id="startBtn">DÉMARRER SCAN</button>

<div id="hud">
<div id="gauge"><div id="needle"></div></div>
<div id="status">Initialisation…</div>
</div>

<script>
const video=document.getElementById("video");
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;canvas.height=innerHeight;

const needle=document.getElementById("needle");
const statusText=document.getElementById("status");
const btn=document.getElementById("startBtn");

///////////////////////
// 📷 CAMERA SAMSUNG FIX
///////////////////////
async function startCamera(){
try{
let stream=await navigator.mediaDevices.getUserMedia({video:true,audio:false});
video.srcObject=stream;
await new Promise(r=>setTimeout(r,800));
await video.play();
}catch(e){
statusText.innerText="Caméra non accessible";
}
}

///////////////////////
// 🧲 DETECTION MAGNETIQUE RÉELLE
///////////////////////
let samples=[];
let noiseLevel=0;
let detected=false;
let angle=0;

async function startSensor(){
if(typeof DeviceOrientationEvent.requestPermission==="function"){
await DeviceOrientationEvent.requestPermission();
}

window.addEventListener("deviceorientationabsolute",e=>{
let strength=Math.sqrt(e.alpha**2+e.beta**2+e.gamma**2);

// analyse bruit temporel
samples.push(strength);
if(samples.length>25) samples.shift();

let avg=samples.reduce((a,b)=>a+b,0)/samples.length;
noiseLevel=Math.sqrt(samples.map(v=>(v-avg)**2).reduce((a,b)=>a+b)/samples.length);

detected=noiseLevel>1.5; // signature aimant

angle=Math.atan2(e.gamma,e.beta);
needle.style.transform="rotate("+angle+"rad)";
});
}

///////////////////////
// 🔊 AUDIO DOUX
///////////////////////
const audioCtx=new(window.AudioContext||window.webkitAudioContext)();
const osc=audioCtx.createOscillator();
const gain=audioCtx.createGain();
osc.type="sine";
osc.connect(gain);
gain.connect(audioCtx.destination);
osc.start();

///////////////////////
// ✨ PARTICULES PREMIUM
///////////////////////
let particles=[];
for(let i=0;i<700;i++){
particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height});
}

function draw(){
ctx.fillStyle="rgba(0,0,0,0.2)";
ctx.fillRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{
p.x+=Math.cos(angle)*(detected?4:0.5);
p.y+=Math.sin(angle)*(detected?4:0.5);

if(p.x<0||p.x>canvas.width||p.y<0||p.y>canvas.height){
p.x=Math.random()*canvas.width;
p.y=Math.random()*canvas.height;
}

ctx.fillStyle=detected?"rgba(0,180,255,0.9)":"rgba(255,255,255,0.25)";
ctx.beginPath();ctx.arc(p.x,p.y,1.4,0,Math.PI*2);ctx.fill();
});

// son
gain.gain.value=detected?0.25:0.02;
osc.frequency.value=detected?220:120;

statusText.innerText=detected?"🧲 Champ perturbé détecté":"Champ stable";

requestAnimationFrame(draw);
}
draw();

btn.onclick=async()=>{
btn.style.display="none";
await startSensor();
await audioCtx.resume();
await startCamera();
};
</script>
</body>
</html>
